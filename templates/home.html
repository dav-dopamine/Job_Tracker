{% extends "base.html" %}

{% block content %}
    <div class="container">
        {% if current_user.is_authenticated %}
            <h1>Welcome, {{ current_user.username }}!</h1>
            <p>Select an option:</p>
            <a href="{{ url_for('apply') }}"><button>Add Job Application</button></a>
            <a href="{{ url_for('job_applications') }}"><button>View Job Applications</button></a>
            <a href="{{ url_for('logout') }}"><button>Log Out</button></a>
        {% else %}
            <h1>Welcome to the Job Tracker</h1>
            <p>Please <a href="{{ url_for('login') }}">Log In</a> or <a href="{{ url_for('signup') }}">Sign Up</a></p>
        {% endif %}
    </div>
{% endblock %}
